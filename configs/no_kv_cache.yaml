experiment:
  name: no_kv_cache_inference
  type: inference
  description: Inference benchmark without KV cache optimization

inference:
  use_kv_cache: false
  model: baseline_training 
  prompt_lengths: [32, 64, 128, 256]
  max_new_tokens: 64
  num_runs: 5
  num_warmup: 3

benchmark:
  output_file: no_kv_cache_inference.csv
